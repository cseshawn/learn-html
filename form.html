<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Registration Form</title>
  </head>
  <body>
    <h1>Course Registration Form</h1>

    <form action="#" method="post">
      <label for="fname">First Name:</label>
      <input
        type="text"
        id="fname"
        name="first_name"
        placeholder="Enter your first name"
        title="Enter your first name"
        required
      />
      <br /><br />

      <label for="lname">Last Name:</label>
      <input
        type="text"
        id="lname"
        name="last_name"
        placeholder="Enter your last name"
        title="Enter your last name"
        required
      />
      <br /><br />

      <label for="password">Password:</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter password"
        title="Password must be entered"
        required
      />
      <br /><br />

      <label>Gender:</label>

      <input type="radio" id="male" name="gender" value="Male" required />
      <label for="male">Male</label>

      <input type="radio" id="female" name="gender" value="Female" />
      <label for="female">Female</label>

      <input type="radio" id="other" name="gender" value="Other" />
      <label for="other">Other</label>

      <br /><br />

      <label>Religion:</label>

      <input type="checkbox" id="islam" name="religion" value="Islam" />
      <label for="islam">Islam</label>

      <input type="checkbox" id="hindu" name="religion" value="Hindu" />
      <label for="hindu">Hindu</label>

      <input type="checkbox" id="christian" name="religion" value="Christian" />
      <label for="christian">Christian</label>

      <br /><br />

      <label for="department">Department:</label>

      <select
        id="department"
        name="department"
        title="Select your department"
        required
      >
        <option value="">Select Department</option>
        <option value="BCSE">BCSE</option>
        <option value="Nursing">Nursing</option>
        <option value="BBA">BBA</option>
        <option value="MBA">MBA</option>
        <option value="CSE">CSE</option>
        <option value="EEE">EEE</option>
      </select>

      <br /><br />

      <label for="regdate">Registration Date:</label>
      <input
        type="date"
        id="regdate"
        name="registration_date"
        title="Choose registration date"
        required
      />

      <br /><br />

      <label for="photo">Choose Your Photo:</label>
      <input
        type="file"
        id="photo"
        name="photo"
        accept="image/*"
        title="Upload your photo"
      />

      <br /><br />

      <label for="comment">Comment:</label>
      <br />

      <textarea
        id="comment"
        name="comment"
        rows="5"
        cols="40"
        placeholder="Write your comment here..."
        title="Enter your comments"
      ></textarea>

      <br /><br />

      <input type="submit" value="Submit Registration" />

      <input type="reset" value="Reset Form" />
    </form>
  </body>
</html>
